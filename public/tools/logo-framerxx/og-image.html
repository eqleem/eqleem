<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>og.png — 1200×630</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1B2130;
  --navy:#21357D;
  --slate:#5B6675;
  --paper:#F2F4F7;
  --line:#E7E9EE;
  --display:"IBM Plex Sans Arabic",system-ui,sans-serif;
  --body:"IBM Plex Sans Arabic",system-ui,sans-serif;
  --mono:"IBM Plex Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#8A8F96;display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:40px;font-family:var(--body)}

/* exactly 1200 × 630 — do not change */
#card{
  width:1200px;height:630px;flex:none;position:relative;overflow:hidden;
  background:var(--paper);
  display:grid;grid-template-columns:1fr 470px;align-items:center;
  padding:72px 80px;gap:56px;
}
#card::after{content:"";position:absolute;inset:0;
  background:radial-gradient(circle at 78% 50%,rgba(33,53,125,.06) 0%,rgba(33,53,125,0) 55%)}
.col{position:relative;z-index:1}

.eyebrow{font-family:var(--mono);font-size:17px;letter-spacing:.2em;color:var(--navy);
  margin-bottom:26px;text-transform:uppercase}
h1{font-family:var(--display);font-weight:700;font-size:58px;line-height:1.35;
  letter-spacing:-.03em;color:var(--ink)}
h1 em{font-style:normal;color:var(--navy)}
p{font-size:23px;line-height:1.75;color:var(--slate);margin-top:26px;max-width:30ch}
.badge{display:inline-block;margin-top:34px;font-family:var(--mono);font-size:15px;
  letter-spacing:.1em;color:var(--navy);border:1.5px solid var(--navy);
  border-radius:999px;padding:8px 16px}

/* the safe-circle diagram — the tool's signature */
.demo{position:relative;width:430px;height:430px;justify-self:center;
  background:#fff;border:1px solid var(--line);border-radius:16px;
  box-shadow:0 1px 2px rgba(16,24,40,.05),0 8px 24px rgba(16,24,40,.06)}
.demo svg{position:absolute;inset:0;width:100%;height:100%}
.mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.mark div{width:212px;height:212px;border-radius:26px;background:var(--navy);
  display:flex;align-items:center;justify-content:center}
.mark span{font-family:var(--display);font-weight:700;font-size:104px;color:#fff;line-height:1}
</style>
</head>
<body>
<div id="card">
  <div class="col">
    <div class="eyebrow">Free · No sign-up</div>
    <h1>شعارك يبقى كاملاً<br>مهما <em>قصّته</em> المنصة</h1>
    <p>ارفع شعارك، واحصل على صورة بروفايل مضبوطة لكل منصات التواصل.</p>
    <div class="badge">SAFE 70.7%</div>
  </div>

  <div class="col demo">
    <div class="mark"><div><span>ش</span></div></div>
    <svg viewBox="0 0 430 430">
      <circle cx="215" cy="215" r="214" fill="none" stroke="#21357D"
              stroke-width="2.5" stroke-dasharray="9 6" opacity=".9"/>
      <rect x="63" y="63" width="304" height="304" fill="none" stroke="#0E1116"
            stroke-width="1" stroke-dasharray="3 4" opacity=".38"/>
      <g stroke="#0E1116" stroke-width="1" opacity=".45">
        <path d="M0 18 H18 M18 0 V18"/><path d="M430 18 H412 M412 0 V18"/>
        <path d="M0 412 H18 M18 430 V412"/><path d="M430 412 H412 M412 430 V412"/>
      </g>
    </svg>
  </div>
</div>
</body>
</html>
